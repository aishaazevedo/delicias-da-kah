<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delícias da Kah - Cardápio Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#FFF8F8] text-gray-800 antialiased pb-32">

    <!-- Topo Minimalista Mobile -->
    <header class="bg-white text-center py-4 shadow-sm sticky top-0 z-40 border-b border-pink-100 flex justify-between items-center px-4">
        <div class="text-[#D14175] text-xl font-bold">💝 Delícias da Kah</div>
        <div class="bg-pink-100 text-[#D14175] font-bold text-xs px-3 py-1 rounded-full">Menu</div>
    </header>

    <!-- Banner Principal Inspirado na Referência -->
    <section class="text-center py-8 px-4 bg-gradient-to-b from-pink-50 to-[#FFF8F8]">
        <h2 class="text-2xl font-extrabold text-gray-800 leading-tight">
            Doces feitos com <br><span class="text-[#D14175] font-serif italic font-normal">amor e carinho!</span>
        </h2>
        <p class="text-xs text-gray-500 mt-2 max-w-xs mx-auto">Delícias que adoçam seus melhores momentos. Escolha abaixo:</p>
    </section>

    <!-- Categorias Horizontais -->
    <div class="sticky top-[57px] bg-[#FFF8F8] py-3 px-4 z-30 overflow-x-auto flex gap-2 no-scrollbar">
    <button onclick="filtrarCategoria('todos')" class="categoria-btn bg-[#D14175] text-white text-xs font-bold px-4 py-2 rounded-full whitespace-nowrap shadow-sm">Todos</button>
    
    <button onclick="filtrarCategoria('kits')" class="categoria-btn bg-white text-gray-600 border border-pink-100 text-xs font-medium px-4 py-2 rounded-full whitespace-nowrap">Kits Especiais</button>
    <button onclick="filtrarCategoria('salgados')" class="categoria-btn bg-white text-gray-600 border border-pink-100 text-xs font-medium px-4 py-2 rounded-full whitespace-nowrap">Salgados de Festa</button>
    <button onclick="filtrarCategoria('paes')" class="categoria-btn bg-white text-gray-600 border border-pink-100 text-xs font-medium px-4 py-2 rounded-full whitespace-nowrap">Pães Delícia</button>
    <button onclick="filtrarCategoria('doces')" class="categoria-btn bg-white text-gray-600 border border-pink-100 text-xs font-medium px-4 py-2 rounded-full whitespace-nowrap">Doces e Tortas</button>
</div>

    <!-- Lista de Produtos (Módulos injetados pelo JS) -->
    <main class="max-w-md mx-auto p-4">
        <section id="lista-produtos" class="grid grid-cols-1 gap-4">
            <!-- Os cards dos doces entram aqui -->
        </section>
    </main>

    <!-- CONTAINER FLUTUANTE DE RESUMO DO PEDIDO & BOTÃO WHATSAPP -->
    <div id="container-checkout" class="fixed bottom-0 left-0 right-0 bg-white border-t border-pink-100 shadow-[0_-5px_15px_rgba(0,0,0,0.05)] p-4 z-50 max-w-md mx-auto rounded-t-3xl hidden">
        
        <!-- Caixa Informativa do Pedido (Baseada no componente rosa da imagem) -->
        <div class="bg-[#FFF0F3] p-4 rounded-2xl mb-3">
            <div class="flex justify-between items-center text-sm font-bold text-gray-800 mb-2">
                <span>🛍️ Seu Pedido (<span id="checkout-qtd">0</span>)</span>
                <span id="checkout-total" class="text-[#D14175] text-base">R$ 0,00</span>
            </div>
            <!-- Lista compacta com os nomes dos itens escolhidos -->
            <div id="checkout-itens-lista" class="text-xs text-gray-600 max-h-20 overflow-y-auto space-y-1 divide-y divide-pink-50">
                <!-- Preenchido dinamicamente pelo JS -->
            </div>
        </div>

        <!-- Botão Principal de Integração com o WhatsApp -->
        <button onclick="enviarParaWhatsApp()" class="w-full bg-[#25D366] hover:bg-[#20ba5a] text-white flex justify-center items-center gap-2 py-3.5 rounded-2xl font-bold text-sm shadow-md transition-all active:scale-[0.98]">
            <!-- Ícone simulando o Zap -->
            <span class="text-lg">💬</span>
            <span>Finalizar pedido pelo WhatsApp</span>
        </button>
    </div>

    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</body>
</html>
<!-- ... resto do código anterior ... -->
    <script src="app.js" defer></script>
</body>
</html>
