<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Delícias da Kah - Cardápio Digital</title>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>

<body class="bg-[#FFF0F2] text-gray-800 antialiased pb-32">

  <!-- Container principal -->
  <div class="w-full max-w-screen-md mx-auto bg-white min-h-screen shadow-2xl relative">

    <!-- Cabeçalho -->
 <header class="bg-[#FFE6EB] border-b border-pink-100/60 sticky top-0 z-40 flex justify-between items-center px-4 py-3">
  <button class="w-10 h-10 flex items-center justify-center bg-white text-[#D14175] rounded-full border border-[#D14175] font-bold text-lg hover:bg-pink-100 transition">☰</button>
  
  <div class="text-center">
    
    <span class="text-xs uppercase font-bold text-[#5C3322] tracking-wider leading-none">Delícias da </span>
    <span class="text-2xl font-serif italic font-black text-[#D14175]">Kah <span class="text-pink-400">💗</span></span>
    <span class="text-[10px] text-[#5C3322] block">Por Karine</span>
  </div>

  <button class="relative w-10 h-10 flex items-center justify-center bg-[#D14175] text-white rounded-full text-base hover:bg-[#b53462] transition shadow-sm">
    🛒
    <span id="carrinho-qtd" class="absolute -top-1 -right-1 bg-[#D14175] text-white border-2 border-[#FFE6EB] font-bold text-[9px] w-5 h-5 flex items-center justify-center rounded-full">0</span>
  </button>
</header>

    <!-- Seção principal -->
    <section class="bg-[#FFF0F2] px-4 py-6 overflow-hidden">
      <div class="flex flex-col md:flex-row items-center justify-between gap-4">
        <div class="md:w-3/5 w-full space-y-3 text-center md:text-left">
          <h2 class="text-base font-black text-[#5C3322] leading-tight">
            Delícias feitas com <br>
            <span class="text-[#D14175] font-serif italic font-normal text-lg block mt-0.5">
              amor e carinho!
            </span>
          </h2>
        </div>
        <div class="md:w-2/5 w-full h-40 md:h-32 rounded-2xl overflow-hidden relative shadow-sm">
          <img src="imagens/forno2.jpeg"
               alt="Doces" class="w-full h-full object-cover">
        </div>
      </div>
    </section>

    <!-- Seção de ícones de qualidade, amor e entrega rápida -->

    <div class="flex justify-between items-start px-6 py-8 bg-[#FFF9FA] border-b border-pink-50">
  
  <div class="flex flex-col items-center w-1/3">
    <div class="w-8 h-8 flex items-center justify-center bg-white rounded-full border border-pink-100 shadow-sm mb-3">
      <i data-lucide="award" class="text-[#D14175] w-3 h-3"></i>
    </div>
    <span class="text-[9px] font-bold text-[#5C3322] text-center uppercase tracking-wide leading-tight">Ingredientes<br>de qualidade</span>
  </div>

  <div class="flex flex-col items-center w-1/3">
    <div class="w-8 h-8 flex items-center justify-center bg-white rounded-full border border-pink-100 shadow-sm mb-3">
      <i data-lucide="heart" class="text-[#D14175] w-3 h-3"></i>
    </div>
    <span class="text-[9px] font-bold text-[#5C3322] text-center uppercase tracking-wide leading-tight">Feito com<br>amor</span>
  </div>

  <div class="flex flex-col items-center w-1/3">
    <div class="w-8 h-8 flex items-center justify-center bg-white rounded-full border border-pink-100 shadow-sm mb-3">
      <i data-lucide="truck" class="text-[#D14175] w-3 h-3"></i>
    </div>
    <span class="text-[9px] font-bold text-[#5C3322] text-center uppercase tracking-wide leading-tight">Entrega rápida<br>e segura</span>
  </div>

</div>

<script>
  lucide.createIcons();
</script>

    <!-- Filtros de categoria -->
<header class="bg-[#FFF0F2] border-b border-pink-100/60 sticky top-0 z-40 w-full">
    <div class="max-w-md mx-auto flex justify-between items-center px-4 py-3">
        </div>
</header>

<div class="sticky top-[73px] bg-white py-3 px-4 z-30 overflow-x-auto flex gap-2 no-scrollbar border-b border-gray-100 shadow-sm">
    <div class="max-w-md mx-auto flex gap-2">
        <button onclick="filtrarCategoria('todos')" class="categoria-btn bg-[#D14175] text-white text-xs font-bold px-4 py-2 rounded-full whitespace-nowrap shadow-sm">Todos</button>
        <button onclick="filtrarCategoria('Kits')" class="categoria-btn bg-gray-100 text-gray-600 text-xs font-medium px-4 py-2 rounded-full whitespace-nowrap">Kits</button>
        <button onclick="filtrarCategoria('Salgados')" class="categoria-btn bg-gray-100 text-gray-600 text-xs font-medium px-4 py-2 rounded-full whitespace-nowrap">Salgados</button>
        <button onclick="filtrarCategoria('Pães')" class="categoria-btn bg-gray-100 text-gray-600 text-xs font-medium px-4 py-2 rounded-full whitespace-nowrap">Pães</button>
        <button onclick="filtrarCategoria('Doces')" class="categoria-btn bg-gray-100 text-gray-600 text-xs font-medium px-4 py-2 rounded-full whitespace-nowrap">Doces</button>
    </div>
</div>

<main class="max-w-md mx-auto bg-white min-h-screen p-4">
    <section id="lista-produtos" class="grid grid-cols-1 gap-4">
        </section>
</main>

    <!-- Checkout fixo -->
   <div id="container-checkout"
     class="fixed bottom-0 left-0 w-full bg-white border-t border-pink-100 shadow-[0_-5px_15px_rgba(0,0,0,0.05)] p-4 z-50 rounded-t-3xl hidden">
    
    <div class="bg-[#FFF0F3] p-4 rounded-2xl mb-3">
        <div class="flex justify-between items-center text-sm font-bold text-gray-800 mb-2">
            <span>🛍️ Seu Pedido (<span id="checkout-qtd">0</span>)</span>
            <span id="checkout-total" class="text-[#D14175] text-base">R$ 0,00</span>
        </div>
        <div id="checkout-itens-lista" class="text-xs text-gray-600 max-h-20 overflow-y-auto space-y-1"></div>
    </div>

    <div class="mb-3">
        <textarea id="observacao" 
                  class="w-full p-3 text-sm border border-gray-200 rounded-2xl focus:outline-none focus:border-[#D14175] transition-all" 
                  placeholder="Alguma observação? (Ex: retirar cebola, ponto da carne...)" 
                  rows="2"></textarea>
    </div>

    <button onclick="enviarParaWhatsApp()" class="w-full bg-[#25D366] text-white py-3.5 rounded-2xl font-bold text-sm shadow-md transition-all active:scale-[0.98]">
        Finalizar pedido pelo WhatsApp
    </button>
</div>

  <script src="app.js" defer></script>
</body>
</html>
